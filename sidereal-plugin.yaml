name: starlink-blade-mcp
version: "0.1.0"
description: "Local-first Starlink dish monitoring and control via gRPC. Dish status, signal quality, obstruction mapping, throughput history, GPS location, diagnostics, and dish control (reboot, stow, unstow) with token-efficient statistical summaries."
author: groupthink-dev
licence: MIT
tier: certified
author_type: first-party
readiness: stub
homepage: https://github.com/groupthink-dev/starlink-blade-mcp
contract: leo-modem-v1

services:
  starlink:
    status: starlink_status
    alerts: starlink_alerts
    obstruction: starlink_obstruction
    history: starlink_history
    location: starlink_location
    diagnostics: starlink_diagnostics
    reboot: starlink_reboot
    stow: starlink_stow
    unstow: starlink_unstow

install:
  runtime: uv
  package: starlink-blade-mcp

setup:
  auth_model: none
  complexity: trivial
  icon: "antenna.radiowaves.left.and.right"
  product: "Starlink Dish"
  blurb: "Monitor and control your Starlink dish over the local network. No cloud API or credentials required."
  fields:
    - key: STARLINK_DISH_ADDRESS
      label: "Dish Address"
      type: string
      secret: false
      required: false
      placeholder: "192.168.100.1:9200"
      help: "Only change if your dish is at a non-standard address (rare)."
    - key: STARLINK_WRITE_ENABLED
      label: "Enable Dish Control"
      type: boolean
      required: false
      help: "Allow reboot, stow, and unstow commands. All control operations require additional per-call confirmation."
  test:
    endpoint: "grpc://192.168.100.1:9200"
    auth_style: none
  prerequisites:
    - "Starlink dish on local network"
    - "Route to 192.168.100.1 (automatic with Starlink router)"
  help:
    - label: "Starlink Network Setup"
      url: "https://support.starlink.com/topic?category=6"
    - label: "Bypass Mode / Third-Party Router"
      url: "https://support.starlink.com/topic?category=19"

env:
  - name: STARLINK_DISH_ADDRESS
    description: "Dish gRPC endpoint (default: 192.168.100.1:9200)"
    secret: false
    default: "192.168.100.1:9200"
  - name: STARLINK_TIMEOUT
    description: "gRPC timeout in seconds"
    secret: false
    default: "10"
  - name: STARLINK_WRITE_ENABLED
    description: "Enable dish control operations (reboot, stow, unstow)"
    secret: false
    default: "false"

conformance:
  required: "0/0"
  last_tested: ""
